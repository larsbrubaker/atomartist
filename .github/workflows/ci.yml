name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  # NOTE: We intentionally do not set `RUSTFLAGS: -D warnings` here.
  # That flag propagates into the sibling path-dep crates checked
  # out next to atomartist (agg-gui, manifold-rust, …), which have
  # their own benign warnings we don't control. If we want strict
  # warning-policing for atomartist's own crates, prefer adding a
  # `cargo clippy --workspace -- -D warnings` step (clippy only
  # lints the current workspace members, not their deps).

# atomartist's crates use path-dependencies pointing at sibling repos
# two levels up (e.g. `../../agg-gui/agg-gui`). Both CI jobs check out
# atomartist into a `atomartist/` subdir and the sibling repos next to
# it so the relative paths resolve the same way they do on a dev
# machine where the user has all five repos side-by-side under
# `rust-apps/`.

jobs:
  test-native:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: atomartist
    steps:
      - name: Checkout atomartist
        uses: actions/checkout@v4
        with:
          path: atomartist

      - name: Checkout agg-gui
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/agg-gui
          path: agg-gui

      - name: Checkout agg-rust
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/agg-rust
          path: agg-rust

      - name: Checkout manifold-rust
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/manifold-rust
          path: manifold-rust

      - name: Checkout clipper2-rust
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/clipper2-rust
          path: clipper2-rust

      - name: Checkout tess2-rust
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/tess2-rust
          path: tess2-rust

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: atomartist

      - name: cargo check --workspace
        run: cargo check --workspace --all-targets

      - name: cargo test --workspace
        run: cargo test --workspace --all-targets

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atomartist
    steps:
      - name: Checkout atomartist
        uses: actions/checkout@v4
        with:
          path: atomartist

      - name: Checkout agg-gui
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/agg-gui
          path: agg-gui

      - name: Checkout agg-rust
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/agg-rust
          path: agg-rust

      - name: Checkout manifold-rust
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/manifold-rust
          path: manifold-rust

      - name: Checkout clipper2-rust
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/clipper2-rust
          path: clipper2-rust

      - name: Checkout tess2-rust
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/tess2-rust
          path: tess2-rust

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: atomartist
          key: wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: wasm-pack build demo-wasm
        run: wasm-pack build demo-wasm --target web --no-typescript
